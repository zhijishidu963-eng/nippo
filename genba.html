<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1D9E75">
<title>現場日報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;}
.header{background:#1D9E75;color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.header-icon{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.header-title{font-size:16px;font-weight:600;}
.header-sub{font-size:11px;opacity:0.85;margin-top:1px;}
.tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:60px;z-index:9;}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-weight:500;}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;}
.section{padding:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500;}
.field input[type="text"],.field textarea{ime-mode:active;}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;font-size:15px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1D9E75;}
.field textarea{resize:none;height:72px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.radio-group{display:flex;gap:8px;}
.radio-btn{flex:1;padding:11px;text-align:center;font-size:14px;border:1px solid #ddd;border-radius:10px;cursor:pointer;color:#888;background:#fff;font-weight:500;transition:all 0.15s;}
.radio-btn.active-today{background:#FFF8E1;border-color:#F59E0B;color:#92610A;}
.radio-btn.active-work{background:#EEF2FF;border-color:#6366F1;color:#3730A3;}
.badge-today{background:#FFF8E1;color:#92610A;}
.radio-btn.active-paid{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.radio-btn.active-unpaid{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D;}
.submit-btn{width:100%;padding:14px;background:#1D9E75;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.submit-btn:active{opacity:0.85;}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:#f5f5f5;border-radius:10px;padding:10px;text-align:center;}
.stat-label{font-size:10px;color:#888;margin-bottom:3px;}
.stat-value{font-size:17px;font-weight:600;color:#1a1a1a;}
.stat-value.green{color:#0F6E56;}
.stat-value.red{color:#A32D2D;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin-bottom:10px;position:relative;}
.visit-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.visit-num{width:26px;height:26px;background:#1D9E75;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.visit-name{font-size:15px;font-weight:600;color:#1a1a1a;}
.visit-meta{font-size:11px;color:#888;margin-top:1px;}
.visit-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.visit-stat{background:#f5f5f5;border-radius:8px;padding:8px 10px;}
.visit-stat-label{font-size:10px;color:#888;margin-bottom:2px;}
.visit-stat-value{font-size:16px;font-weight:600;color:#1a1a1a;}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
.badge-paid{background:#E1F5EE;color:#0F6E56;}
.badge-unpaid{background:#FCEBEB;color:#A32D2D;}
.visit-note{font-size:12px;color:#666;padding-top:8px;border-top:1px solid #f0f0f0;}
.del-btn{position:absolute;top:12px;right:12px;width:24px;height:24px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;color:#888;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.export-btn{width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;background:#fff;color:#666;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1D9E75;color:white;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="white" stroke-width="1.5"/><line x1="5" y1="6" x2="13" y2="6" stroke="white" stroke-width="1.2"/><line x1="5" y1="9" x2="13" y2="9" stroke="white" stroke-width="1.2"/><line x1="5" y1="12" x2="10" y2="12" stroke="white" stroke-width="1.2"/></svg>
    </div>
    <div>
      <div class="header-title">現場日報</div>
      <div class="header-sub" id="today-date"></div>
    </div>
  </div>

  <div id="name-setup" style="padding:16px;background:#f0faf6;border-bottom:1px solid #b8e8d8;">
    <div style="font-size:12px;color:#0F6E56;font-weight:600;margin-bottom:6px;">担当者名</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="staff-name" placeholder="例：田中" lang="ja" inputmode="text" style="flex:1;padding:10px 12px;font-size:15px;border:1px solid #b8e8d8;border-radius:10px;background:#fff;color:#1a1a1a;font-family:inherit;ime-mode:active;">
      <button onclick="saveName()" style="padding:10px 16px;background:#1D9E75;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">設定</button>
    </div>
    <div id="name-saved" style="display:none;margin-top:6px;font-size:11px;color:#0F6E56;display:flex;align-items:center;gap:8px;">✅ 設定済み（次回も引き継がれます）<button id="edit-name-btn" onclick="editName()" style="display:none;font-size:11px;padding:2px 8px;border:1px solid #b8e8d8;border-radius:6px;background:#fff;color:#0F6E56;cursor:pointer;font-family:inherit;">修正</button></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('input')">入力</div>
    <div class="tab" onclick="showTab('list')">一覧</div>
  </div>

  <div id="tab-input" class="section">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="field" style="margin-bottom:0;"><label>地域</label><select id="region">
        <option value="">選択</option>
        <option>A</option><option>B</option><option>C</option><option>D</option>
        <option>E</option><option>F</option><option>G</option><option>H</option>
        <option>I</option><option>J</option><option>K</option><option>L</option>
      </select></div>
      <div class="field" style="margin-bottom:0;"><label>客番</label><input type="text" id="kyakuban" placeholder="例：1234" inputmode="numeric"></div>
      <div class="field" style="margin-bottom:0;"><label>年間回数</label><input type="number" id="nenkan" placeholder="例：12" inputmode="numeric"></div>
    </div>
    <div class="field"><label>顧客名</label><input type="text" id="customer" placeholder="例：山田商店" lang="ja" inputmode="text"></div>
    <div class="field"><label>請求先</label><input type="text" id="seikyusaki" placeholder="例：本社経理部" lang="ja" inputmode="text"></div>
    <div class="field">
      <label>作業内容と金額</label>
      <div style="border:1px solid #ddd;border-radius:10px;overflow:hidden;">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #f0f0f0;">
          <div onclick="toggleWork('tenken')" style="padding:12px 6px;cursor:pointer;text-align:center;border-right:1px solid #f0f0f0;">
            <div style="font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;">点検</div>
            <div id="chk-tenken" style="width:20px;height:20px;border:2px solid #ddd;border-radius:5px;margin:0 auto;display:flex;align-items:center;justify-content:center;"></div>
          </div>
          <div onclick="toggleWork('seiso')" style="padding:12px 6px;cursor:pointer;text-align:center;border-right:1px solid #f0f0f0;">
            <div style="font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;">清掃</div>
            <div id="chk-seiso" style="width:20px;height:20px;border:2px solid #ddd;border-radius:5px;margin:0 auto;display:flex;align-items:center;justify-content:center;"></div>
          </div>
          <div onclick="toggleWork('other')" style="padding:12px 6px;cursor:pointer;text-align:center;">
            <div style="font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:6px;">その他</div>
            <div id="chk-other" style="width:20px;height:20px;border:2px solid #ddd;border-radius:5px;margin:0 auto;display:flex;align-items:center;justify-content:center;"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;">
          <div id="amt-box-tenken" style="display:none;padding:8px 8px;border-right:1px solid #f0f0f0;">
            <input type="text" id="amt-tenken" placeholder="金額" inputmode="numeric" style="width:100%;padding:6px 8px;font-size:13px;border:1px solid #ddd;border-radius:8px;text-align:center;" />
          </div>
          <div id="amt-box-seiso" style="display:none;padding:8px 8px;border-right:1px solid #f0f0f0;">
            <input type="text" id="amt-seiso" placeholder="金額" inputmode="numeric" style="width:100%;padding:6px 8px;font-size:13px;border:1px solid #ddd;border-radius:8px;text-align:center;" />
          </div>
          <div id="amt-box-other" style="display:none;padding:8px 8px;">
            <input type="text" id="amt-other" placeholder="金額" inputmode="numeric" style="width:100%;padding:6px 8px;font-size:13px;border:1px solid #ddd;border-radius:8px;text-align:center;" />
          </div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>支払い</label>
      <div class="radio-group">
        <div class="radio-btn" id="btn-today" onclick="setPayment('today')">当日集金</div>
        <div class="radio-btn" id="btn-paid" onclick="setPayment('paid')" style="font-size:13px;">集金済み<div style="font-size:9px;opacity:0.75;margin-top:1px;">1年分</div></div>
        <div class="radio-btn" id="btn-unpaid" onclick="setPayment('unpaid')">未払い</div>
      </div>
    </div>
    <div id="paid-note-field" style="display:none;margin-bottom:14px;">
      <div style="background:#E1F5EE;border-radius:10px;padding:12px 14px;font-size:13px;color:#0F6E56;">✅ 1年分集金済みのため各作業の金額入力は不要です</div>
    </div>
    <div class="field"><label>備考</label><textarea id="note" placeholder="特記事項があれば入力" lang="ja" inputmode="text"></textarea></div>
    <button class="submit-btn" onclick="submitRecord()">一覧に追加</button>
  </div>

  <div id="tab-list" class="section" style="display:none;">
    <div id="summary-bar" style="display:none;" class="summary-bar">
      <div class="stat-box"><div class="stat-label">訪問件数</div><div class="stat-value" id="s-count">0</div></div>
      <div class="stat-box"><div class="stat-label">売上合計</div><div class="stat-value green" id="s-amount">¥0</div></div>
      <div class="stat-box"><div class="stat-label">未払い</div><div class="stat-value red" id="s-unpaid">0件</div></div>
    </div>
    <div id="records-list"><div class="empty">まだ記録がありません</div></div>
    <button id="bulk-send-btn" style="display:none;width:100%;padding:14px;background:#1D9E75;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px;" onclick="bulkSend()">📡 一括送信する</button>
    <button class="export-btn" id="export-btn" style="display:none;" onclick="exportCSV()">CSVで出力する ↓</button>
  </div>
</div>
<div class="toast" id="toast">一覧に追加しました</div>

<script>
let records = [];
let payment = '';

const d = new Date();
const youbi = ['日','月','火','水','木','金','土'][d.getDay()];
const dateStr = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + youbi + '）';

// 日付が変わったらレコードをクリア
const savedDate = localStorage.getItem('lastDate');
if(savedDate && savedDate !== dateStr) { records = []; }
localStorage.setItem('lastDate', dateStr);
document.getElementById('today-date').textContent = dateStr;

function saveName() {
  const val = document.getElementById('staff-name').value.trim();
  if(!val){ alert('名前を入力してください'); return; }
  localStorage.setItem('staffName', val);
  document.getElementById('name-saved').style.display = 'block';
  document.getElementById('staff-name').disabled = true;
  document.getElementById('edit-name-btn').style.display = 'inline-block';
}

function editName() {
  document.getElementById('staff-name').disabled = false;
  document.getElementById('staff-name').focus();
  document.getElementById('name-saved').style.display = 'none';
  document.getElementById('edit-name-btn').style.display = 'none';
}

// 起動時に保存済みの名前を復元
(function loadSavedName() {
  const saved = localStorage.getItem('staffName');
  if(saved) {
    document.getElementById('staff-name').value = saved;
    document.getElementById('staff-name').disabled = true;
    document.getElementById('name-saved').style.display = 'block';
    document.getElementById('edit-name-btn').style.display = 'inline-block';
  }
})();

function showTab(tab) {
  document.getElementById('tab-input').style.display = tab==='input'?'block':'none';
  document.getElementById('tab-list').style.display = tab==='list'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='list')));
  if(tab==='list') renderRecords();
}

let selectedWorks = {};

function toggleWork(key) {
  if(selectedWorks[key]) {
    delete selectedWorks[key];
    document.getElementById('chk-'+key).innerHTML = '';
    document.getElementById('chk-'+key).style.borderColor = '#ddd';
    document.getElementById('amt-box-'+key).style.display = 'none';
    document.getElementById('amt-'+key).value = '';
  } else {
    selectedWorks[key] = true;
    document.getElementById('chk-'+key).innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#1D9E75" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
    document.getElementById('chk-'+key).style.borderColor = '#1D9E75';
    document.getElementById('amt-box-'+key).style.display = 'block';
  }
}

function getWorkItems() {
  const labels = {tenken:'点検', seiso:'清掃', other:'その他（工事など）'};
  return Object.keys(selectedWorks).map(k=>({
    name: labels[k],
    amount: parseInt(document.getElementById('amt-'+k).value)||0
  }));
}

function setPayment(val) {
  payment = val;
  document.getElementById('btn-today').className = 'radio-btn'+(val==='today'?' active-today':'');
  document.getElementById('btn-paid').className = 'radio-btn'+(val==='paid'?' active-paid':'');
  document.getElementById('btn-unpaid').className = 'radio-btn'+(val==='unpaid'?' active-unpaid':'');
  const isPaid = val==='paid';
  document.getElementById('paid-note-field').style.display = isPaid?'block':'none';
}

function submitRecord() {
  const region = document.getElementById('region').value;
  const customer = document.getElementById('customer').value.trim();
  const kyakuban = document.getElementById('kyakuban').value.trim();
  const nenkan = document.getElementById('nenkan').value.trim();
  const seikyusaki = document.getElementById('seikyusaki').value.trim();
  const note = document.getElementById('note').value.trim();
  const workItems = getWorkItems();
  if(!region||!customer||!payment){alert('地域・顧客名・支払いを入力してください');return;}
  if(workItems.length===0){alert('作業内容を1つ以上選択してください');return;}
  if(payment!=='paid'&&workItems.some(w=>w.amount===0)){alert('各作業の金額を入力してください');return;}
  const totalAmount = payment==='paid'?0:workItems.reduce((s,w)=>s+w.amount,0);
  const workType = workItems.map(w=>w.name).join('・');
  const workDetail = workItems.map(w=>w.name+(payment!=='paid'?'(¥'+w.amount.toLocaleString()+')':'')).join(' / ');
  const record = {region,kyakuban,nenkan:nenkan?parseInt(nenkan):0,customer,seikyusaki,workType,workDetail,workItems,amount:totalAmount,payment,note};
  records.push(record);
  // リセット
  document.getElementById('region').value='';
  document.getElementById('customer').value='';
  document.getElementById('kyakuban').value='';
  document.getElementById('nenkan').value='';
  document.getElementById('seikyusaki').value='';
  document.getElementById('note').value='';
  payment=''; selectedWorks={};
  ['tenken','seiso','other'].forEach(k=>{
    document.getElementById('chk-'+k).innerHTML='';
    document.getElementById('chk-'+k).style.borderColor='#ddd';
    document.getElementById('amt-box-'+k).style.display='none';
    document.getElementById('amt-'+k).value='';
  });
  document.getElementById('btn-today').className='radio-btn';
  document.getElementById('btn-paid').className='radio-btn';
  document.getElementById('btn-unpaid').className='radio-btn';
  document.getElementById('paid-note-field').style.display='none';
  showTab('list');
  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}

function bulkSend() {
  if(records.length===0){alert('送信するデータがありません');return;}
  if(!window._db){alert('Firebase接続中です。少し待ってから試してください');return;}
  if(!confirm(records.length+'件を送信しますか？')) return;
  const staffName = document.getElementById('staff-name').value.trim() || '不明';
  const d = new Date();
  const ds = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  records.forEach(record => {
    window._addDoc(window._collection(window._db, 'records'), {
      region: record.region,
      kyakuban: record.kyakuban||'',
      nenkan: record.nenkan||0,
      customer: record.customer,
      seikyusaki: record.seikyusaki||'',
      workType: record.workType||'',
      workDetail: record.workDetail||'',
      amount: record.amount,
      payment: record.payment,
      note: record.note||'',
      staff: staffName,
      date: ds,
      createdAt: window._serverTimestamp()
    });
  });
  alert(records.length+'件を送信しました！');
  records = [];
  renderRecords();
}

function deleteRecord(i){records.splice(i,1);renderRecords();}

function renderRecords() {
  const list=document.getElementById('records-list');
  const sb=document.getElementById('summary-bar');
  const eb=document.getElementById('export-btn');
  const bb=document.getElementById('bulk-send-btn');
  if(records.length===0){list.innerHTML='<div class="empty">まだ記録がありません</div>';sb.style.display='none';eb.style.display='none';bb.style.display='none';return;}
  sb.style.display='grid';eb.style.display='block';bb.style.display='block';
  const total=records.reduce((s,r)=>s+r.amount,0);
  const unpaid=records.filter(r=>r.payment==='未払い').length;
  document.getElementById('s-count').textContent=records.length+'件';
  document.getElementById('s-amount').textContent='¥'+total.toLocaleString();
  document.getElementById('s-unpaid').textContent=unpaid+'件';
  list.innerHTML=records.map((r,i)=>`
    <div class="visit-card">
      <button class="del-btn" onclick="deleteRecord(${i})">✕</button>
      <div class="visit-header">
        <div class="visit-num">${i+1}</div>
        <div><div class="visit-name">${r.customer}${r.seikyusaki?' <span style="font-size:11px;color:#888;">（'+r.seikyusaki+'）</span>':''}</div><div class="visit-meta">地域${r.region}${r.kyakuban?' ・ 客番:'+r.kyakuban:''}${r.nenkan?' ・ 年'+r.nenkan+'回':''}</div></div>
      </div>
      <div style="background:#f5f5f5;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#555;">${r.workDetail||r.workType||''}</div>
      <div class="visit-body">
        <div class="visit-stat"><div class="visit-stat-label">支払い</div><div style="margin-top:3px;"><span class="badge ${r.payment==='paid'?'badge-paid':r.payment==='today'?'badge-today':'badge-unpaid'}">${r.payment==='paid'?'集金済み':r.payment==='today'?'当日集金':'未払い'}</span></div></div>
        <div class="visit-stat"><div class="visit-stat-label">合計金額</div><div class="visit-stat-value" style="font-size:${r.payment==='paid'?'12px':'16px'};">${r.payment==='paid'?'1年分集金済':'¥'+r.amount.toLocaleString()}</div></div>
      </div>
      ${r.note?`<div class="visit-note">備考：${r.note}</div>`:''}
    </div>`).join('');
}

function exportCSV() {
  if(records.length===0){alert('記録がありません');return;}
  const header='日付,件数,地域,客番,年間回数,顧客名,請求先,作業内容,合計金額,支払い,備考';
  const rows=records.map((r,i)=>[dateStr,i+1,r.region,r.kyakuban||'',r.nenkan||'',r.customer,r.seikyusaki||'',r.workDetail||r.workType||'',r.amount,r.payment==='paid'?'集金済み':r.payment==='today'?'当日集金':'未払い',r.note].join(','));
  const csv='\uFEFF'+[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
